services:
  - type: web
    name: tnc-analyzer-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_GEMINI
        value: true
      - key: ENABLE_LOCAL_FALLBACK
        value: false
      - key: BACKEND_BASE_URL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
